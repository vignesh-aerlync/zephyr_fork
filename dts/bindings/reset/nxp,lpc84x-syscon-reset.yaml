description: |
  NXP LPC84x SYSCON peripheral reset controller.
  Manages resets via PRESETCTRL0/1 using read-modify-write.
  Reset ID encoding: ((register_index << 16) | bit_position).

compatible: "nxp,lpc84x-syscon-reset"

include: [reset-controller.yaml]

properties:
  "#reset-cells":
    const: 1

reset-cells:
  - id
