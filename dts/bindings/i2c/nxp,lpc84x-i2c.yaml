description: LPC84x I2C Controller

compatible: "nxp,lpc84x-i2c"

include: [i2c-controller.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  clocks:
    required: true

  clock-source:
    type: string
    enum: ["fro", "mainclk", "frg0", "frg1", "frodiv"]
    default: "fro"
    description: I2C clock source.
