description: NXP LPC84x ADC

compatible: "nxp,lpc84x-adc"

include:
  - name: adc-controller.yaml
  - name: pinctrl-device.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  clocks:
    required: true

  clk-divider:
    type: int
    required: true
    description: |
      Clock divider for the ADC peripheral clock.
      The ADC functional clock is derived from the main system clock
      divided by this value. Valid range is 1 to 256.

  nxp,burst-mode:
    type: boolean
    description: |
      Enable hardware burst mode for Sequence A.
      When enabled, the ADC will continuously cycle through the selected
      channels in hardware. When disabled, the ADC requires a software
      trigger for each conversion cycle.

  nxp,ref-internal-mv:
    type: int
    default: 3300
    description: |
      Internal reference voltage in millivolts.
      Default is 3300 mV (3.3V) for most LPC84x variants.

  nxp,trigger-source:
    type: int
    default: 0
    description: |
      Selects which of the available hardware trigger sources will cause
      this conversion sequence to be initiated.
      0: No hardware trigger (software trigger).
      1: PININT0_IRQ
      2: PININT1_IRQ
      3: SCT0_OUT3
      4: SCT0_OUT4
      5: T0_MAT3
      6: CMP0_OUT_ADC (Analog comparator output)
      7: GPIO_INT_BMAT

  nxp,trigger-polarity:
    type: int
    default: 1
    description: |
      Select the polarity of the selected input trigger.
      0: Negative edge
      1: Positive edge

io-channel-cells:
  - input
