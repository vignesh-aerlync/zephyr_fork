description: |
  NXP LPC84x on chip flash controller (ROM IAP, FMC)

compatible: "nxp,iap-fmc84x"

include:
  - flash-controller.yaml
  - base.yaml

properties:
  clocks:
    required: true

  flash-access-time:
    type: int
    required: true
    default: 2
    enum: [0, 1, 2]
    description: |
      Controls flash read wait-state count written to `FLASHCFG.FLASHTIM`
      0 = 1 system clock, 18 MHz
      1 = 2 system clocks, 24 MHz
      2 = 3 system clocks This is the hardware reset default. 30 MHz
      Must match the actual system clock frequency to avoid flash read errors.
